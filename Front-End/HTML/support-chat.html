<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MySoul | Live Chat</title>
  <link rel="stylesheet" href="/CSS/support-chat.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header class="navbar">
  <div class="logo">
      <span class="logo-my">My</span><span class="logo-soul">Soul</span>
  </div>
  <a href="./live-support.html" class="back-btn">← Back</a>
</header>

<!-- CHAT MAIN AREA -->
<section class="chat-container">

  <div class="chat-window" id="chatWindow">
      <div class="bot-msg bubble">
        Hi! 💗 I'm MySoul Support Assistant.<br>
        How can I help you today?
      </div>
  </div>

  <!-- INPUT AREA -->
  <div class="chat-input">
      <input type="text" id="userMsg" placeholder="Type your message...">
      <button onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
  </div>

</section>

<script src="/JS/support-chat.js"></script>
</body>
</html>
