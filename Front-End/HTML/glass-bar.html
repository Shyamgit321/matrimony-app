<!-- ===============================
     iOS 16 GLASS QUICK BAR
     (Place AFTER hero-slider)
================================ -->

<section class="glass-quick-bar">
  <form class="glass-form" action="register.html" method="get">

    <!-- Name -->
    <input
      type="text"
      name="name"
      placeholder="Your Name"
      required
    >

    <!-- Country Code -->
    <select class="country-code" name="code">
      <option value="+91">+91</option>
      <option value="+65">+65</option>
      <option value="+1">+1</option>
    </select>

    <!-- Mobile (ONLY 10 DIGITS) -->
    <input
      type="text"
      name="mobile"
      id="mobile"
      placeholder="Mobile No."
      maxlength="10"
      pattern="[0-9]{10}"
      title="Please enter exactly 10 digit mobile number"
      required
    >

    <!-- Annual Income -->
    <select name="income">
      <option value="">Annual Income</option>
      <option value="0-3">0 – 3 LPA</option>
      <option value="3-6">3 – 6 LPA</option>
      <option value="6-10">6 – 10 LPA</option>
      <option value="10+">10+ LPA</option>
    </select>

    <!-- Mother Tongue -->
    <select name="tongue">
      <option value="">Mother Tongue</option>
      <option value="Hindi">Hindi</option>
      <option value="English">English</option>
      <option value="Bengali">Bengali</option>
      <option value="Odia">Odia</option>
      <option value="Tamil">Tamil</option>
      <option value="Telugu">Telugu</option>
    </select>

    <!-- CTA -->
    <button type="submit" class="glass-btn">
      Let’s MySoul
    </button>

  </form>
</section>

<!-- ===============================
     MOBILE NUMBER VALIDATION
================================ -->
<script>
  const mobileInput = document.getElementById("mobile");

  mobileInput.addEventListener("input", function () {
    // Allow only numbers
    this.value = this.value.replace(/[^0-9]/g, "");

    // Limit to 10 digits
    if (this.value.length > 10) {
      this.value = this.value.slice(0, 10);
    }
  });
</script>
