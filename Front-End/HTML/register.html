<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | MySoul</title>

  <link rel="stylesheet" href="../CSS/header.css">
  <link rel="stylesheet" href="../CSS/register.css">
</head>

<body data-page="register">

<div id="header"></div>

<section class="register-section">
  <div class="register-card">

    <h2>Create Account</h2>
    <p>Join MySoul to find your life partner</p>

    <div id="successMsg" class="success-msg" style="display:none;">
      ✅ Registration Successful!
    </div>

    <form id="registerForm">

      <div class="input-box">
        <span class="icon">👤</span>
        <input type="text" id="name" placeholder="Full Name" required>
      </div>

      <div class="input-box">
        <span class="icon">📧</span>
        <input type="email" id="email" placeholder="Email address" required>
      </div>

      <div class="input-box">
        <span class="icon">📱</span>
        <input type="text" id="phone" placeholder="Mobile number" maxlength="10" required>
      </div>

      <div class="input-box">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Password" required>
        <span class="toggle-text" onclick="togglePassword('password', this)">Show</span>
      </div>

      <div class="input-box">
        <span class="icon">🔒</span>
        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
        <span class="toggle-text" onclick="togglePassword('confirmPassword', this)">Show</span>
      </div>

      <p id="passwordError" class="error-text"></p>

      <button type="submit" class="register-btn">Register</button>
    </form>

    <p class="bottom-text">
      Already have an account?
      <a href="login.html">Sign In</a>
    </p>

  </div>
</section>

<script src="../JS/config.js"></script>
<script src="../JS/loadHeader.js"></script>
<script src="../JS/register.js"></script>

</body>
</html>
