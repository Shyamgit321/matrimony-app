<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MySoul | Contact Us</title>
  <link rel="stylesheet" href="/CSS/contact-us.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">
    <span class="logo-my">My</span><span class="logo-soul">Soul</span>
  </div>
  <a id="dynamicBack" class="back-btn">← Back</a>
</header>

<h1 class="page-title">Contact Us</h1>

<!-- MAIN CONTAINER -->
<div class="contact-container">

  <!-- LEFT SIDE: DETAILS -->
  <div class="contact-info-card">

    <h2>Get in Touch</h2>
    <p class="info-text">We are always here to help you with love ❤️</p>

    <!-- Phone -->
    <div class="info-item">
      <i class="fa-solid fa-phone"></i>
      <span>+91-9876543210</span>
    </div>

    <!-- Email -->
    <div class="info-item">
      <i class="fa-solid fa-envelope"></i>
      <span>support@mysoul.com</span>
    </div>

    <!-- Address -->
    <div class="info-item">
      <i class="fa-solid fa-location-dot"></i>
      <span>MySoul HQ, Kutigram, Baharagora, Jharkhand, India</span>
    </div>

    <!-- WHATSAPP SECTION -->
    <div class="info-item whatsapp-box">
      <i class="fa-brands fa-whatsapp"></i>
      <span>+91 9661055227</span>
    </div>

    <a href="https://wa.me/919661055227" target="_blank" class="wa-button">
      <i class="fa-brands fa-whatsapp"></i> Chat on WhatsApp
    </a>

    <!-- MAP -->
    <div class="map-box">
      <iframe 
  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3680.067096747192!2d87.36526087491971!3d22.273963243538997!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a020a4ab1bc1e2f%3A0xf0f991e2da39b3e5!2sKutigram%2C%20Baharagora%2C%20Jharkhand%20832202!5e0!3m2!1sen!2sin!4v1705956400000!5m2!1sen!2sin" 
  width="100%" 
  height="200" 
  style="border:0; border-radius: 14px;" 
  allowfullscreen="" 
  loading="lazy" 
  referrerpolicy="no-referrer-when-downgrade">
</iframe>
    </div>

  </div>

  <!-- RIGHT SIDE: FORM -->
  <div class="contact-form-card">

    <h2>Send Us a Message</h2>

    <form id="contactForm" onsubmit="return submitMessage(event)">
      <input type="text" id="cName" class="field" placeholder="Your Full Name">
      <input type="email" id="cEmail" class="field" placeholder="Your Email">

      <input type="text" id="cPhone" class="field" placeholder="Mobile Number (optional)" maxlength="10">

      <textarea id="cMessage" class="field" placeholder="Your Message..." rows="5"></textarea>

      <button class="submit-btn">Send Message</button>
    </form>

  </div>

</div>

<!-- SUCCESS POPUP -->
<div id="successPopup" class="popup">Message Sent ✔</div>

<script src="/JS/contact-us.js"></script>
</body>
</html>
